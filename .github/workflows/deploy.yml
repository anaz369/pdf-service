on:
  push:
    branches:
      - main
  workflow_dispatch:

name: 🚀 Deploy PDF Service

jobs:
  deploy:
    name: 🎉 Deploy to cPanel
    runs-on: ubuntu-latest
    steps:
      - name: 🚚 Checkout code
        uses: actions/checkout@v4

      - name: 📦 Install lftp
        run: sudo apt-get install -y lftp

      - name: 📂 Mirror repo to server
        run: |
          lftp -c "
            set ftp:ssl-allow no;
            set net:timeout 30;
            set net:max-retries 3;
            set net:reconnect-interval-base 5;
            open ftp://${{ secrets.FTP_USERNAME }}:${{ secrets.FTP_PASSWORD }}@${{ secrets.FTP_SERVER }};
            mirror --reverse --delete --verbose \
              --exclude-glob node_modules/ \
              --exclude-glob .git/ \
              --exclude-glob .github/ \
              --exclude-glob .env \
              --exclude-glob tmp/ \
              . /puppeteer-pdf/;
          "

      - name: 🔄 Restart app via FTP trigger
        run: |
          date > restart.txt
          curl -T restart.txt \
            --ftp-pasv \
            --ftp-create-dirs \
            --connect-timeout 30 \
            --max-time 60 \
            --retry 3 \
            --retry-delay 5 \
            --silent --show-error \
            "ftp://${{ secrets.FTP_SERVER }}/puppeteer-pdf/tmp/restart.txt" \
            -u "${{ secrets.FTP_USERNAME }}:${{ secrets.FTP_PASSWORD }}"
          echo "✅ Restart triggered"
