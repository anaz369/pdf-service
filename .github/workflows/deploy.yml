on:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      full_sync:
        description: 'Full sync — re-upload ALL files to server'
        required: false
        default: 'false'
        type: boolean

name: 🚀 Deploy PDF Service

jobs:
  deploy:
    name: 🎉 Deploy to cPanel
    runs-on: ubuntu-latest
    steps:
      - name: 🚚 Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: 🔍 Get changed files (normal push)
        if: ${{ github.event.inputs.full_sync != 'true' }}
        id: changed
        run: |
          git diff --name-only HEAD~1 HEAD > changed_files.txt
          echo "Changed files:"
          cat changed_files.txt

      - name: 🗂️ Get ALL files (full sync)
        if: ${{ github.event.inputs.full_sync == 'true' }}
        run: |
          find . -type f \
            ! -path './node_modules/*' \
            ! -path './.git/*' \
            ! -path './.github/*' \
            ! -path './tmp/*' \
            ! -name '.env' \
            | sed 's|^\./||' > changed_files.txt
          echo "Full sync — files to upload:"
          wc -l changed_files.txt

      - name: 📂 Upload files
        run: |
          while IFS= read -r file; do
            if [ -f "$file" ]; then
              echo "Uploading: $file"
              curl -T "$file" \
                --ftp-pasv \
                --ftp-create-dirs \
                --connect-timeout 30 \
                --max-time 60 \
                --retry 3 \
                --retry-delay 5 \
                --silent --show-error \
                "ftp://${{ secrets.FTP_SERVER }}/puppeteer-pdf/$file" \
                -u "${{ secrets.FTP_USERNAME }}:${{ secrets.FTP_PASSWORD }}"
              echo "Done: $file"
            fi
          done < changed_files.txt

      - name: 🔄 Restart app via FTP trigger
        run: |
          date > restart.txt
          curl -T restart.txt \
            --ftp-pasv \
            --ftp-create-dirs \
            --connect-timeout 30 \
            --max-time 60 \
            --retry 3 \
            --retry-delay 5 \
            --silent --show-error \
            "ftp://${{ secrets.FTP_SERVER }}/puppeteer-pdf/tmp/restart.txt" \
            -u "${{ secrets.FTP_USERNAME }}:${{ secrets.FTP_PASSWORD }}"
          echo "✅ Restart triggered"
