on:
  push:
    branches:
      - main
  workflow_dispatch:

name: 🚀 Deploy PDF Service

jobs:
  deploy:
    name: 🎉 Deploy to cPanel
    runs-on: ubuntu-latest
    steps:
      - name: 🚚 Checkout code
        uses: actions/checkout@v4

      - name: 📦 Install lftp
        run: sudo apt-get install -y lftp

      - name: 📂 Upload only changed files via lftp
        run: |
          lftp -c "
          set ftp:ssl-allow false;
          set ftp:passive-mode true;
          set net:timeout 30;
          set net:max-retries 3;
          set mirror:use-pget-n 5;
          open -u '${{ secrets.FTP_USERNAME }}','${{ secrets.FTP_PASSWORD }}' ftp://${{ secrets.FTP_SERVER }};
          mirror --reverse --verbose --only-newer \
            --exclude-glob .git/ \
            --exclude-glob .gitignore \
            --exclude-glob node_modules/ \
            --exclude-glob .env \
            --exclude-glob tmp/ \
            --exclude-glob .github/ \
            . /puppeteer-pdf/;
          bye
          "

      - name: 🔄 Trigger app restart via lftp
        run: |
          date > restart.txt
          lftp -c "
          set ftp:ssl-allow false;
          set ftp:passive-mode true;
          open -u '${{ secrets.FTP_USERNAME }}','${{ secrets.FTP_PASSWORD }}' ftp://${{ secrets.FTP_SERVER }};
          put restart.txt -o /puppeteer-pdf/tmp/restart.txt;
          bye
          "
