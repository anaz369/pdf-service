on:
  push:
    branches:
      - main
  workflow_dispatch:

name: 🚀 Deploy PDF Service

jobs:
  deploy:
    name: 🎉 Deploy to cPanel
    runs-on: ubuntu-latest
    steps:
      - name: 🚚 Checkout code
        uses: actions/checkout@v4

      - name: 📂 Upload files via FTP
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          server-dir: /puppeteer-pdf/
          local-dir: ./
          protocol: ftp          
          port: 21               
          security: loose        
          exclude: |
            **/.git*
            **/.git*/**
            **/node_modules/**
            **/.env
            **/tmp/**

      - name: 🔄 Trigger app restart
        run: |
          mkdir -p tmp
          date > tmp/restart.txt

      - name: 📂 Upload restart.txt
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          server-dir: /puppeteer-pdf/tmp/
          local-dir: tmp/