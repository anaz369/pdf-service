on:
  push:
    branches:
      - main
  workflow_dispatch:

name: 🚀 Deploy PDF Service

jobs:
  deploy:
    name: 🎉 Deploy to cPanel
    runs-on: ubuntu-latest
    steps:
      - name: 🚚 Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: 📂 Deploy via FTP
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          local-dir: ./
          server-dir: /puppeteer-pdf/
          exclude: |
            **/.git*
            **/.git*/**
            **/node_modules/**
            **/.env
            **/tmp/**

      - name: 🔄 Restart app via FTP trigger
        run: |
          date > restart.txt
          curl -T restart.txt \
            --ftp-pasv \
            --ftp-create-dirs \
            --connect-timeout 30 \
            --max-time 60 \
            --retry 3 \
            --retry-delay 5 \
            --silent --show-error \
            "ftp://${{ secrets.FTP_SERVER }}/puppeteer-pdf/tmp/restart.txt" \
            -u "${{ secrets.FTP_USERNAME }}:${{ secrets.FTP_PASSWORD }}"
          echo "✅ Restart triggered"
