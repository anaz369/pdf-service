on:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      full_sync:
        description: 'Full sync — re-upload ALL files to server'
        required: false
        default: 'false'
        type: boolean

name: 🚀 Deploy PDF Service

jobs:
  deploy:
    name: 🎉 Deploy to cPanel
    runs-on: ubuntu-latest
    steps:
      - name: 🚚 Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: 📦 Install lftp
        run: sudo apt-get install -y lftp

      - name: 🔍 Get changed files (normal push)
        if: ${{ github.event.inputs.full_sync != 'true' }}
        run: |
          git diff --name-only HEAD~1 HEAD > changed_files.txt
          echo "Changed files:"
          cat changed_files.txt

      - name: 🗂️ Get ALL files (full sync)
        if: ${{ github.event.inputs.full_sync == 'true' }}
        run: |
          find . -type f \
            ! -path './node_modules/*' \
            ! -path './.git/*' \
            ! -path './.github/*' \
            ! -path './tmp/*' \
            ! -name '.env' \
            | sed 's|^\./||' > changed_files.txt
          echo "Full sync — files to upload:"
          wc -l changed_files.txt

      - name: 📂 Upload files & trigger restart
        env:
          FTP_SERVER: ${{ secrets.FTP_SERVER }}
          FTP_USERNAME: ${{ secrets.FTP_USERNAME }}
          FTP_PASSWORD: ${{ secrets.FTP_PASSWORD }}
        run: |
          # Build a single lftp script — ONE connection for uploads + restart
          date > restart.txt
          {
            echo "set ftp:passive-mode true;"
            echo "set ftp:ssl-allow no;"
            echo "set ftp:keepalive-interval 60;"
            echo "set net:timeout 60;"
            echo "set net:max-retries 5;"
            echo "open -u $FTP_USERNAME,$FTP_PASSWORD ftp://$FTP_SERVER;"

            while IFS= read -r file; do
              if [[ "$file" == node_modules/* ]] || \
                 [[ "$file" == .git* ]] || \
                 [[ "$file" == .env ]] || \
                 [[ "$file" == tmp/* ]] || \
                 [[ "$file" == .github/* ]]; then
                continue
              fi

              if [ -f "$file" ]; then
                echo "Uploading: $file"
                dir=$(dirname "$file")
                echo "mkdir -fp /puppeteer-pdf/$dir;"
                echo "put $file -o /puppeteer-pdf/$file;"
              fi
            done < changed_files.txt

            # Trigger app restart in the same session
            echo "mkdir -fp /puppeteer-pdf/tmp;"
            echo "put restart.txt -o /puppeteer-pdf/tmp/restart.txt;"

            echo "bye"
          } > upload.lftp

          lftp -f upload.lftp
          echo "✅ Restart triggered"
