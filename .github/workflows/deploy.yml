on:
  push:
    branches:
      - main
  workflow_dispatch:

name: 🚀 Deploy PDF Service

jobs:
  deploy:
    name: 🎉 Deploy to cPanel
    runs-on: ubuntu-latest
    steps:
      - name: 🚚 Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: 📦 Install lftp
        run: sudo apt-get install -y lftp

      - name: 🔍 Get changed files
        id: changed
        run: |
          git diff --name-only HEAD~1 HEAD > changed_files.txt
          echo "Changed files:"
          cat changed_files.txt

      - name: 📂 Upload only changed files
        run: |
          while IFS= read -r file; do
            if [[ "$file" == node_modules/* ]] || \
               [[ "$file" == .git* ]] || \
               [[ "$file" == .env ]] || \
               [[ "$file" == tmp/* ]] || \
               [[ "$file" == .github/* ]]; then
              echo "Skipping: $file"
              continue
            fi

            if [ -f "$file" ]; then
              echo "Uploading: $file"
              dir=$(dirname "$file")
              lftp -c "
              set ftp:ssl-allow false;
              set ftp:passive-mode true;
              set net:timeout 15;
              set net:max-retries 2;
              open -u '${{ secrets.FTP_USERNAME }}','${{ secrets.FTP_PASSWORD }}' ftp://${{ secrets.FTP_SERVER }};
              mkdir -p /puppeteer-pdf/$dir;
              put $file -o /puppeteer-pdf/$file;
              bye
              "
            fi
          done < changed_files.txt

      - name: 🔄 Restart app via cPanel API
        run: |
          echo "Restarting Node.js app via cPanel API..."
          HTTP_STATUS=$(curl -s -o /tmp/cpanel_response.txt -w "%{http_code}" \
            -u "${{ secrets.CPANEL_USERNAME }}:${{ secrets.CPANEL_PASSWORD }}" \
            "https://${{ secrets.CPANEL_HOST }}:2083/execute/NodeJS/restart_app" \
            --data-urlencode "app_name=puppeteer-pdf" \
            -k) || true
          echo "HTTP Status: $HTTP_STATUS"
          cat /tmp/cpanel_response.txt || true
          if [ "$HTTP_STATUS" == "200" ]; then
            echo "✅ App restarted successfully"
          else
            echo "⚠️ Restart may have failed — check cPanel manually"
          fi
