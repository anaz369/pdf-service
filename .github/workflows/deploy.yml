on:
  push:
    branches:
      - main
  workflow_dispatch:

name: 🚀 Deploy PDF Service

jobs:
  deploy:
    name: 🎉 Deploy to cPanel
    runs-on: ubuntu-latest
    steps:
      - name: 🚚 Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: 🔍 Get changed files
        id: changed
        run: |
          git diff --name-only HEAD~1 HEAD > changed_files.txt
          echo "Changed files:"
          cat changed_files.txt

      - name: 📂 Upload only changed files
        run: |
          while IFS= read -r file; do
            if [[ "$file" == node_modules/* ]] || \
               [[ "$file" == .git* ]] || \
               [[ "$file" == .env ]] || \
               [[ "$file" == tmp/* ]] || \
               [[ "$file" == .github/* ]]; then
              echo "Skipping: $file"
              continue
            fi

            if [ -f "$file" ]; then
              echo "Uploading: $file"
              curl -T "$file" \
                --ftp-pasv \
                --ftp-create-dirs \
                --connect-timeout 30 \
                --max-time 60 \
                --retry 3 \
                --retry-delay 5 \
                --silent --show-error \
                "ftp://${{ secrets.FTP_SERVER }}/puppeteer-pdf/$file" \
                -u "${{ secrets.FTP_USERNAME }}:${{ secrets.FTP_PASSWORD }}"
              echo "Done: $file"
            fi
          done < changed_files.txt

      - name: 🔄 Restart app via cPanel API
        run: |
          echo "Restarting Node.js app via cPanel API..."
          HTTP_STATUS=$(curl -s -o /tmp/cpanel_response.txt -w "%{http_code}" \
            -H "Authorization: cpanel ${{ secrets.CPANEL_USERNAME }}:${{ secrets.CPANEL_API_TOKEN }}" \
            "https://${{ secrets.CPANEL_HOST }}:2083/execute/NodeJS/restart_app?app_name=puppeteer-pdf" \
            -k)
          echo "HTTP Status: $HTTP_STATUS"
          cat /tmp/cpanel_response.txt
          if [ "$HTTP_STATUS" == "200" ]; then
            echo "✅ App restarted successfully"
          else
            echo "❌ Restart failed with HTTP $HTTP_STATUS"
            exit 1
          fi
